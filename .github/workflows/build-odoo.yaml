name: Build Custom Odoo Images

on:
  push:
    branches: [main]
    paths:
      - 'docker/Dockerfile.*'
      - '.github/workflows/build-odoo.yaml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        version: ["17", "18", "19"]
    steps:
    - uses: actions/checkout@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Odoo ${{ matrix.version }}
      uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/Dockerfile.${{ matrix.version }}
        push: true
        tags: |
          ghcr.io/${{ github.repository }}/odoo-custom:${{ matrix.version }}
          ghcr.io/${{ github.repository }}/odoo-custom:${{ matrix.version }}-${{ github.sha }}
