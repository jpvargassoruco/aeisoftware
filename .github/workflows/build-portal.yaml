name: Build & Push SaaS Portal

on:
  push:
    branches: [k3s-saas]
    paths:
      - 'portal/**'
      - '.github/workflows/build-portal.yaml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push portal image
      uses: docker/build-push-action@v5
      with:
        context: ./portal
        push: true
        tags: |
          ghcr.io/${{ github.repository }}/saas-portal:latest
          ghcr.io/${{ github.repository }}/saas-portal:${{ github.sha }}
