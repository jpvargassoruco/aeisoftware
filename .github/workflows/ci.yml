name: Odoo Base Image CI

# Validates the root-level master Odoo Dockerfile.
# Scoped to exclude portal/ — portal CI/CD is handled by portal-dev.yml and portal-prod.yml.

on:
  push:
    branches: [main]
    paths-ignore:
      - "portal/**"
      - ".github/workflows/portal-dev.yml"
      - ".github/workflows/portal-prod.yml"
      - ".github/workflows/pr-gate.yml"
  pull_request:
    branches: [main]
    paths-ignore:
      - "portal/**"

jobs:
  build:
    name: Build master Odoo image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Master Odoo Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: aeisoftware/master-odoo:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
