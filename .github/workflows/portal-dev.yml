name: Portal — Dev CI/CD

# Triggers on every push to the `dev` branch that touches portal code.
# Job 1 (build):  runs on ubuntu-latest  — builds + pushes :dev-latest to GHCR.
# Job 2 (deploy): runs on self-hosted k3s — rolls out the new image to portal-dev.
#
# NOTE: Build and deploy MUST be separate jobs because:
#   - ubuntu-latest has Docker daemon  → can build images
#   - self-hosted k3s runner has kubectl → can deploy to cluster, but NO Docker daemon

on:
  push:
    branches: [dev]
    paths:
      - "portal/**"
      - ".github/workflows/portal-dev.yml"

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/aeisoftware/saas-portal

jobs:
  # ── Job 1: Build + push image (requires Docker) ────────────────────────────
  build:
    name: Build & Push → :dev-latest
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # push to GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push :dev-latest
        uses: docker/build-push-action@v5
        with:
          context: ./portal
          push: true
          tags: ${{ env.IMAGE }}:dev-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: Deploy to portal-dev (requires kubectl inside K3s) ──────────────
  deploy:
    name: Deploy → portal-dev
    needs: build
    runs-on: [self-hosted, k3s]

    steps:
      - name: Roll out new image
        run: |
          kubectl set image deployment/saas-portal \
            portal=${{ env.IMAGE }}:dev-latest \
            -n portal-dev
          kubectl rollout status deployment/saas-portal \
            -n portal-dev --timeout=120s

      - name: Verify health
        run: |
          echo "Waiting for portal-dev to pass readiness..."
          for i in $(seq 1 12); do
            STATUS=$(kubectl get deployment saas-portal -n portal-dev \
              -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo 0)
            [ "$STATUS" -ge 1 ] && echo "✅ portal-dev is ready" && exit 0
            echo "  attempt $i/12 — ready replicas: ${STATUS:-0}"
            sleep 10
          done
          echo "❌ portal-dev did not become ready in time"
          exit 1

