name: Portal — Prod CI/CD

# Triggers on merge to `main` (after a PR from dev is approved and merged).
# Job 1 (build):  runs on ubuntu-latest — builds + pushes :latest to GHCR.
# Job 2 (deploy): runs on ubuntu-latest — deploys to portal-system via CF Tunnel.

on:
  push:
    branches: [main]
    paths:
      - "portal/**"
      - ".github/workflows/portal-prod.yml"

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/aeisoftware/saas-portal

jobs:
  # ── Job 1: Build + push image ──────────────────────────────────────────────
  build:
    name: Build & Push → :latest
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push :latest
        uses: docker/build-push-action@v5
        with:
          context: ./portal
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: Deploy to portal-system (via CF Tunnel → K3s API) ───────────────
  deploy:
    name: Deploy → portal-system (prod)
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.K8S_CONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy to portal-system namespace
        run: |
          kubectl set image deployment/saas-portal \
            portal=${{ env.IMAGE }}:${{ github.sha }} \
            -n portal-system
          kubectl rollout status deployment/saas-portal \
            -n portal-system --timeout=180s

      - name: Verify health
        run: |
          echo "Waiting for portal-system to pass readiness..."
          for i in $(seq 1 18); do
            STATUS=$(kubectl get deployment saas-portal -n portal-system \
              -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo 0)
            [ "$STATUS" -ge 1 ] && echo "✅ portal-system is ready" && exit 0
            echo "  attempt $i/18 — ready replicas: ${STATUS:-0}"
            sleep 10
          done
          echo "❌ portal-system did not become ready in time"
          exit 1
