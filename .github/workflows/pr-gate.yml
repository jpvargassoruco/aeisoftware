name: Portal — PR Gate

# Runs on every PR targeting main.
# Build-only (push: false) — validates the Dockerfile compiles correctly
# before allowing the merge that will trigger portal-prod.yml.

on:
  pull_request:
    branches: [main]
    paths:
      - "portal/**"
      - ".github/workflows/portal-prod.yml"
      - ".github/workflows/pr-gate.yml"

jobs:
  build-check:
    name: Build check (no push)
    runs-on: ubuntu-latest     # cheap external runner — no deploy, no secrets needed

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build portal image (dry run)
        uses: docker/build-push-action@v5
        with:
          context: ./portal
          push: false
          tags: saas-portal:pr-check
          cache-from: type=gha
          cache-to: type=gha,mode=max
