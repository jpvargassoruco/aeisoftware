name: Test & QA Deploy — SaaS Portal

# ─────────────────────────────────────────────────────────────────────────────
# Triggered on every pull_request to main that touches portal code.
#  1. Builds the image locally (no push)
#  2. Starts docker compose (portal + postgres)
#  3. Runs smoke_test.sh against localhost
#  4. On success, tags and pushes a qa-{sha} image and deploys to portal-qa
# ─────────────────────────────────────────────────────────────────────────────

on:
  pull_request:
    branches: [main]
    paths:
      - 'portal/**'
      - '.github/workflows/test-portal.yaml'
      - '.github/workflows/deploy-portal.yaml'

jobs:
  # ── Job 1: Build + local smoke test ────────────────────────────────────────
  test:
    name: Build & Local Smoke Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: portal_test
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build portal image (local, no push)
      uses: docker/build-push-action@v5
      with:
        context: ./portal
        push: false
        load: true
        tags: saas-portal:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Start portal container
      run: |
        docker run -d \
          --name portal-test \
          --network host \
          -e PORTAL_API_KEY="test-api-key" \
          -e PATRONI_HOST="localhost" \
          -e PATRONI_PORT="5432" \
          -e PATRONI_USER="odoo" \
          -e PATRONI_PASS="test_password" \
          -e CF_API_TOKEN="test-token" \
          -e CF_ACCOUNT_ID="test-account" \
          -e CF_ZONE_ID="test-zone" \
          -e CF_TUNNEL_ID="test-tunnel" \
          -e S3_ENDPOINT="http://localhost:7480" \
          -e S3_ACCESS_KEY="test-key" \
          -e S3_SECRET_KEY="test-secret" \
          -e S3_BUCKET="test-bucket" \
          saas-portal:test

    - name: Wait for portal to be ready
      run: |
        echo "Waiting for portal /health..."
        for i in {1..30}; do
          if curl -sf http://localhost:8000/health; then
            echo "Portal is ready ✅"
            break
          fi
          echo "Attempt $i/30 — waiting..."
          sleep 3
        done

    - name: Run smoke tests
      run: |
        chmod +x portal/tests/smoke_test.sh
        bash portal/tests/smoke_test.sh "http://localhost:8000" "test-api-key"

    - name: Show portal logs on failure
      if: failure()
      run: docker logs portal-test

  # ── Job 2: Push qa image + deploy to portal-qa ─────────────────────────────
  deploy-qa:
    name: Deploy → QA
    needs: test
    if: success()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Compute image tag
      id: tag
      run: echo "image_tag=qa-${{ github.sha }}" >> "$GITHUB_OUTPUT"

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push QA image
      uses: docker/build-push-action@v5
      with:
        context: ./portal
        push: true
        tags: |
          ghcr.io/${{ github.repository }}/saas-portal:${{ steps.tag.outputs.image_tag }}
          ghcr.io/${{ github.repository }}/saas-portal:qa-latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Deploy to QA namespace
      uses: ./.github/workflows/deploy-portal.yaml
      with:
        environment: qa
        image_tag: ${{ steps.tag.outputs.image_tag }}
      secrets:
        K8S_CONFIG: ${{ secrets.K8S_CONFIG }}
        PATRONI_PASS: ${{ secrets.PATRONI_PASS }}
        CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
        S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
        PORTAL_API_KEY_QA: ${{ secrets.PORTAL_API_KEY_QA }}
