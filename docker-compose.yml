#version: '3.8'

services:
  # Master PostgreSQL database
  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=odoo
      - POSTGRES_USER=odoo
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
    restart: always

  # Master Odoo Instance
  odoo:
    build: .
    depends_on:
      - db
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=odoo
      # Cloudflare specifics (provided externally)
      - CF_API_TOKEN=${CF_API_TOKEN:-}
      - CF_ACCOUNT_ID=${CF_ACCOUNT_ID:-}
      - CF_ZONE_ID=${CF_ZONE_ID:-}
      - CF_TUNNEL_ID=${CF_TUNNEL_ID:-}
    volumes:
      # Map the source code into the container
      - ./addons:/mnt/extra-addons
#      - ./aei_saas_manager:/mnt/extra-addons/aei_saas_manager
      - ./cloudflare_manager:/opt/aeisoftware/cloudflare_manager
      # Mount strictly required for Docker-out-of-Docker
      - /var/run/docker.sock:/var/run/docker.sock
      # Data volumes
      - odoo-web-data:/var/lib/odoo
      # Odoo config
      - ./odoo.conf:/etc/odoo/odoo.conf
      # Shared path for child instances
      - /home/ubuntu/odoo_docker:/home/ubuntu/odoo_docker
    restart: always
    expose:
      - "8069"
      - "8072"
    networks:
      - default
      - web-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web-proxy"
      - "traefik.http.middlewares.odoo-master-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
      # ROUTER PRINCIPAL (HTTP 8069)
      - "traefik.http.routers.odoo-master.rule=Host(`master.aeisoftware.com`)"
      - "traefik.http.routers.odoo-master.entrypoints=web"
      - "traefik.http.routers.odoo-master.service=odoo-master-svc"
      - "traefik.http.routers.odoo-master.middlewares=odoo-master-headers"
      - "traefik.http.services.odoo-master-svc.loadbalancer.server.port=8069"
      # ROUTER WEBSOCKET (Chat/Video 8072)
      - "traefik.http.routers.odoo-master-ws.rule=Host(`master.aeisoftware.com`) && PathPrefix(`/websocket`)"
      - "traefik.http.routers.odoo-master-ws.entrypoints=web"
      - "traefik.http.routers.odoo-master-ws.service=odoo-master-ws-svc"
      - "traefik.http.routers.odoo-master-ws.middlewares=odoo-master-headers"
      - "traefik.http.services.odoo-master-ws-svc.loadbalancer.server.port=8072"

  # Traefik Reverse Proxy
  traefik:
    image: traefik:latest
    container_name: traefik
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.endpoint=unix:///var/run/docker.sock"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - web-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.middlewares.odoo-compress.compress=true"
      - "traefik.http.middlewares.odoo-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
    restart: always

volumes:
  odoo-db-data:
  odoo-web-data:

networks:
  web-proxy:
    external: true
