apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: client1-odoo-data
  namespace: odoo-client1
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: client1-odoo-addons
  namespace: odoo-client1
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
