apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: client3-odoo-data
  namespace: odoo-client3
  annotations:
    description: "Odoo filestore — CephFS (ReadWriteMany, zero RBD lock contention)"
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ceph-cephfs
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: client3-odoo-addons
  namespace: odoo-client3
  annotations:
    description: "Custom addons — CephFS (ReadWriteMany, shared across all workers)"
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ceph-cephfs
  resources:
    requests:
      storage: 5Gi
