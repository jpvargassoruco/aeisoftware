apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: odoo17-odoo-data
  namespace: odoo-odoo17
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: odoo17-odoo-addons
  namespace: odoo-odoo17
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
