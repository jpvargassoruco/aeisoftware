apiVersion: v1
kind: ConfigMap
metadata:
  name: odoo18-odoo-conf
  namespace: odoo-odoo18
data:
  odoo.conf: |
    [options]
    ; Base de Datos (Azure PostgreSQL compartido)
    db_host = aeisoftwaredb.postgres.database.azure.com
    db_port = 5432
    db_user = odoo
    db_password = Ribentek2026+
    db_name = odoo18
    db_filter = odoo18

    ; Contraseña maestra
    admin_passwd = LRBIKGWmtLlquUgx8y+5xOpQhPuVSSwG

    ; Rutas
    addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
